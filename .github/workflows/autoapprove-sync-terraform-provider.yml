name: autoapprove sync terraform provider

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: autoapprove-sync-terraform-provider-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  approve:
    if: ${{ startsWith(github.event.pull_request.head.ref, 'sync-terraform-provider/') && github.event.pull_request.head.repo.full_name == github.repository && !github.event.pull_request.draft }}
    runs-on: ubuntu-latest

    steps:
      - name: Verify commits are from GitHub Actions
        id: commits
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          unexpected="$(
            gh api --paginate "repos/$REPOSITORY/pulls/$PR_NUMBER/commits" \
              --jq '.[] | select(.author.login != "github-actions[bot]" or .committer.login != "github-actions[bot]") | "\(.sha) author=\(.author.login // "unknown") committer=\(.committer.login // "unknown")"'
          )"

          if [ -n "$unexpected" ]; then
            echo "Refusing to approve because not all commits are by github-actions[bot]:"
            echo "$unexpected"
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "eligible=true" >> "$GITHUB_OUTPUT"

      - name: Approve pull request
        if: ${{ steps.commits.outputs.eligible == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.AUTO_APPROVE_TOKEN || github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr review "$PR_NUMBER" --approve --body "Auto-approved sync-terraform-provider PR generated by github-actions[bot]."

  notify-slack-on-failure:
    name: Notify Slack on failure
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    needs:
      - approve
    runs-on: ubuntu-latest
    steps:
      - name: Post text to a Slack channel
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_OAUTH_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL }}
            text: |
              🚨 Workflow *${{ github.workflow }}* failed on <${{ github.server_url }}/${{ github.repository }}|${{ github.repository }}>
              <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>
