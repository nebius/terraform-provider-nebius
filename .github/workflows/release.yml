name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_existing_tag:
        description: Publish release assets when the version tag already exists.
        required: false
        default: true
        type: boolean

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare-release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      release_needed: ${{ steps.version.outputs.release_needed }}
      version: ${{ steps.version.outputs.version }}
      version_tag: ${{ steps.version.outputs.version_tag }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Read version and create tag if missing
        id: version
        env:
          PUBLISH_EXISTING_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_existing_tag }}
        run: |
          version="$(sed -n 's/^const versionString = "\(.*\)"$/\1/p' provider/version/version.go)"
          if [ -z "$version" ]; then
            echo "Failed to read versionString from provider/version/version.go" >&2
            exit 1
          fi

          if ! printf '%s\n' "$version" | grep -Eq '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "versionString must be a valid SemVer version, got: $version" >&2
            exit 1
          fi

          version_tag="v$version"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "version_tag=$version_tag" >> "$GITHUB_OUTPUT"

          if git rev-parse -q --verify "refs/tags/$version_tag" >/dev/null; then
            if [ "$PUBLISH_EXISTING_TAG" = "true" ]; then
              echo "release_needed=true" >> "$GITHUB_OUTPUT"
              echo "Tag $version_tag already exists, publishing release assets."
              exit 0
            fi

            echo "release_needed=false" >> "$GITHUB_OUTPUT"
            echo "Tag $version_tag already exists, skipping release."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$version_tag" -m "Release $version_tag"
          git push origin "refs/tags/$version_tag"
          echo "release_needed=true" >> "$GITHUB_OUTPUT"

  # Publish signed release assets for Terraform Registry ingestion.
  goreleaser:
    needs: prepare-release
    if: needs.prepare-release.outputs.release_needed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ needs.prepare-release.outputs.version_tag }}

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PGP_PASSPHRASE }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-slack-on-failure:
    name: Notify Slack on failure
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    needs:
      - prepare-release
      - goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Post text to a Slack channel
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_OAUTH_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL }}
            text: |
              🚨 Workflow *${{ github.workflow }}* failed on <${{ github.server_url }}/${{ github.repository }}|${{ github.repository }}>
              <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>
